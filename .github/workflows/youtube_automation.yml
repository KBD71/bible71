name: Daily Bible Content Generator

on:
  # 1. 매일 오전 7시부터 오후 11시까지, 매 시간 정각에 실행 (UTC 기준)
  # KST 기준으로는 매일 오전 7시부터 23시까지 매시간 실행됩니다.
  schedule:
    - cron: '0 22,0-14 * * *' # UTC 22시(KST 7시) ~ UTC 14시(KST 23시)
  
  # 2. 수동 실행을 위한 버튼 추가
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 리포지토리 코드를 가져옴
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Python 환경 설정
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. Python 의존성 라이브러리 설치
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade google-generativeai google-api-python-client youtube-transcript-api

      # 4. Python 스크립트 실행
      - name: Run Python script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python run.py

      # 5. 변경된 파일이 있을 경우 자동으로 커밋 및 푸시
      - name: Commit and push if content changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "feat:
[Automated] Add new daily bible content"
          commit_user_name: "GitHub Actions Bot"
          commit_user_email: "actions@github.com"
          commit_author: "GitHub Actions Bot <actions@github.com>"
          # last_video_id.txt 파일과 dailybible/ 폴더의 변경사항만 커밋
          file_pattern: "last_video_id.txt dailybible/*.html"
