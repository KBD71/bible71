name: Daily Bible Sermon Summarizer

on:
  schedule:
    # 매일 오전 11시 00분 KST (KST는 UTC+9이므로 UTC로는 02:00)
    - cron: '0 2 * * *'
    # 매일 오후 3시 00분 KST (오전 업로드 누락 시 재시도, UTC로는 06:00)
    - cron: '0 6 * * *'
  workflow_dispatch: # GitHub 웹 UI에서 수동 실행 가능

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  summarize-sermon:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests youtube-transcript-api google-generativeai yt-dlp

    - name: Run Sermon Summarizer
      env:
        YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python dailybible/dailybible_generator.py --auto --limit 5

    - name: Check for new files
      id: git-check
      run: |
        # Check if there are untracked or modified html files in dailybible/
        if [ -n "$(git status --porcelain dailybible/)" ]; then
          echo "changes=true" >> $GITHUB_OUTPUT
          echo "New sermon pages detected!"
        else
          echo "changes=false" >> $GITHUB_OUTPUT
          echo "No new sermon pages generated."
        fi

    - name: Commit and push changes
      if: steps.git-check.outputs.changes == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add dailybible/*.html
        git commit -m "자동 업데이트: 새 새벽기도 설교 요약 페이지 추가
        
        🤖 Generated with GitHub Actions and Gemini API
        
        Co-Authored-By: GitHub Action <action@github.com>"
        git push
